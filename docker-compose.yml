services:
  surveillance-go:
    container_name: surveillance-go
    build:
      context: .
      dockerfile: Dockerfile
    image: surveillance-go:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    env_file:
      - .env
    environment:
      SSL_CERT_PATH: /app/cert.pem
      SSL_KEY_PATH: /app/key.pem
      FACE_RECOGNITION_KNOWN_FACES_DIR: /known_faces
      FACE_RECOGNITION_CASCADE_PATH: /app/haarcascade_frontalface_default.xml
      XDG_RUNTIME_DIR: /run/user/1000
      PULSE_SERVER: unix:/run/user/1000/pulse/native
      PULSE_COOKIE: /tmp/pulse-cookie
    volumes:
      - ${HOME}/certs/cert.pem:/app/cert.pem:ro
      - ${HOME}/certs/key.pem:/app/key.pem:ro
      - /usr/share/opencv4/haarcascades/haarcascade_frontalface_default.xml:/app/haarcascade_frontalface_default.xml:ro
      - ${FACE_RECOGNITION_KNOWN_FACES_DIR:-./known_faces}:/known_faces
      - /dev:/dev
      - /dev/snd:/dev/snd
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      - ${HOME}/.config/pulse/cookie:/tmp/pulse-cookie:ro
      - /run/udev:/run/udev:ro
    group_add:
      - audio
      - video
